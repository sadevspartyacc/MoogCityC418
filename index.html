<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Moog City Player</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            cursor: pointer; /* Чтобы было понятно, что надо кликнуть */
        }
    </style>
</head>
<body onclick="startAudio()">
    <div style="text-align: center;">
        <h2>Moog City (Minecraft Cover)</h2>
        <p>ID: 1547165</p>
        <p style="font-size: 12px; color: #666;">click to autoplay</p>
        
        <audio id="mcc" loop autoplay>
            <source src="mcc.webm" type="audio/mpeg">
            reload page or try different browser if not working
        </audio>
    </div>

    <script>
        function startAudio() {
            var audio = document.getElementById("mcc");
            audio.play();
            // Убираем подсказку после клика
            document.querySelector('p:last-of-type').style.display = 'none';
        }
    </script>
</body>
</html>
